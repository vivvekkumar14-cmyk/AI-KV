<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Detail</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div class="product-detail">
  <div class="image">
    <img src="https://via.placeholder.com/500x600">
  </div>

  <div class="info">
    <h1>Imperial Jacket</h1>
    <p class="price">$1,200</p>
    <p>
      Crafted with premium Italian leather and engineered
      for modern Western dominance.
    </p>

    <button class="btn">Add to Cart</button>
    <button class="btn-outline">Buy Now</button>
  </div>
</div>

<section class="related">
  <h2>Related Products</h2>
  <div class="product-grid">
    <div class="card">
      <img src="https://via.placeholder.com/300x400">
      <h3>Sovereign Boots</h3>
      <p>$950</p>
    </div>
  </div>
</section>

</body>
</html>
